name: CI-DevSecOps

on:
  push:
    branches: [ "main" ]
    tags: ['v*.*.*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read 
    steps:
      - name: Checkout repository 
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests (Pytest)
        run: |
          pytest test_app.py

      - name: Codebase Security Scan (Trivy FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1' # 发现高危漏洞则报错
          severity: 'CRITICAL,HIGH'

  build-and-push:
    needs: test-and-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set Lowercase image name 
        id: image
        run: echo "name=${{ env.REGISTRY }}/$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
        
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      # 步骤 1: 只构建+写缓存，导出为 tar 文件（不 load，不 push）
      - name: Build Docker image (export as tar)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          outputs: type=docker,dest=/tmp/image.tar   # ✅ 导出为 tar，兼容 docker-container driver
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:security-check
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 步骤 2: 加载 tar 到本地 Docker
      - name: Load image into Docker
        run: docker load --input /tmp/image.tar

      # 步骤 3: 扫描
      - name: Image Vulnerability Scan (Trivy Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:security-check
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      # 步骤 4: 扫描通过后正式推送（命中缓存，很快）
      - name: Build and push Docker image (Final)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max